services:
  - type: web
    name: whatsapp-calendar-bot
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health/live
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: WHATSAPP_DISPLAY_PHONE_NUMBER
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: REQUIRE_WEBHOOK_SIGNATURE
        value: "true"
      - key: ALLOW_UNSIGNED_WEBHOOKS
        value: "false"
      - key: UNSIGNED_WEBHOOK_EXPIRES_AT
        sync: false
      - key: WEBHOOK_PATH_SECRET
        sync: false
      - key: DOCTOR_WHATSAPP_NUMBER
        sync: false
      - key: INBOX_PASSWORD
        sync: false
      - key: INBOX_PASSWORD_HASH
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: INBOX_SESSION_HOURS
        value: "8"
      - key: MAX_REQUEST_BYTES
        value: "128000"
      - key: WEBHOOK_RATE_LIMIT_PER_MINUTE
        value: "120"
      - key: WEBHOOK_PHONE_RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: INBOX_RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: INBOX_SEND_RATE_LIMIT_PER_MINUTE
        value: "20"
      - key: INBOX_ACTION_RATE_LIMIT_PER_MINUTE
        value: "30"
      - key: INBOX_LOGIN_RATE_LIMIT_PER_15_MINUTES
        value: "5"
      - key: INBOX_ALLOW_LEGACY_TOKEN_ACCESS
        value: "false"
      - key: EXTERNAL_REQUEST_TIMEOUT_MS
        value: "8000"
      - key: EXTERNAL_REQUEST_RETRIES
        value: "2"
      - key: ENABLE_REMINDER_WORKER
        value: "false"
      - key: ENABLE_PATIENT_REMINDER_TEMPLATES
        value: "false"
      - key: WHATSAPP_REMINDER_TEMPLATE_24H
        sync: false
      - key: WHATSAPP_REMINDER_TEMPLATE_2H
        sync: false
      - key: WHATSAPP_TEMPLATE_LANGUAGE
        value: es_MX
      - key: REQUIRE_DB_FOR_APPOINTMENTS
        value: "true"
      - key: REQUIRE_SUPABASE_FOR_APPOINTMENTS
        value: "true"
      - key: APPOINTMENT_LOCK_MINUTES
        value: "10"
      - key: REMINDER_WORKER_INTERVAL_MS
        value: "60000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_CALENDAR_ID
        value: primary
      - key: AI_PROVIDER
        value: local
      - key: CLINIC_TIMEZONE
        value: America/Mexico_City
      - key: CLINIC_NAME
        value: Consultorio Ginecologico
      - key: APPOINTMENT_MINUTES
        value: 40
      - key: APPOINTMENT_DURATION_MINUTES
        value: 40
      - key: MAX_OFFERED_SLOTS
        value: 6
      - key: WORK_DAYS
        value: 1,2,3,4,5
      - key: CLINIC_WORK_DAYS
        value: 1,2,3,4,5
      - key: WORK_START
        value: 16:40
      - key: CLINIC_START_TIME
        value: 16:40
      - key: WORK_END
        value: 20:00
      - key: CLINIC_END_TIME
        value: 20:00
      - key: CONSULTATION_PRICE
        value: 1000
      - key: PROMOTION_PRICE
        value: 1200
      - key: CLINIC_ADDRESS
        sync: false
      - key: INCLUDE_SENSITIVE_APPOINTMENT_NOTES
        value: "false"
      - key: MASK_PATIENT_PHONE_IN_CALENDAR
        value: "true"
      - key: INCLUDE_PATIENT_CONTACT_IN_CALENDAR
        value: "false"
      - key: BOT_PAUSE_TIMEOUT_MINUTES
        value: "120"
      - key: FORWARD_CONVERSATION_COPIES
        value: "false"
      - key: FORWARD_CONVERSATION_BODIES
        value: "false"
