services:
  - type: web
    name: whatsapp-calendar-bot
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: REQUIRE_WEBHOOK_SIGNATURE
        value: "true"
      - key: DOCTOR_WHATSAPP_NUMBER
        sync: false
      - key: INBOX_PASSWORD
        sync: false
      - key: INBOX_SESSION_HOURS
        value: "8"
      - key: MAX_REQUEST_BYTES
        value: "256000"
      - key: WEBHOOK_RATE_LIMIT_PER_MINUTE
        value: "600"
      - key: INBOX_RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: ENABLE_REMINDER_WORKER
        value: "true"
      - key: REMINDER_WORKER_INTERVAL_MS
        value: "60000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_CALENDAR_ID
        value: primary
      - key: AI_PROVIDER
        value: local
      - key: CLINIC_TIMEZONE
        value: America/Mexico_City
      - key: CLINIC_NAME
        value: Consultorio Ginecologico
      - key: APPOINTMENT_MINUTES
        value: 40
      - key: MAX_OFFERED_SLOTS
        value: 6
      - key: WORK_DAYS
        value: 1,2,3,4,5
      - key: WORK_START
        value: 16:40
      - key: WORK_END
        value: 20:00
